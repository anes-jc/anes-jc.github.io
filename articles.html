<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{
    --paper:#F4F6F4;--paper-2:#FBFCFB;--ink:#15302D;--ink-soft:#2C4541;
    --teal:#0F766E;--teal-deep:#0B4F4A;--amber:#C96A2B;--muted:#5C6B68;--line:#D9E0DC;--line-strong:#BCC8C3;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:"Noto Sans JP",sans-serif;line-height:1.8;-webkit-font-smoothing:antialiased;font-feature-settings:"palt" 1}
  .wrap{max-width:920px;margin:0 auto;padding:0 24px}
  header.bar{border-bottom:1px solid var(--line);background:rgba(244,246,244,.86);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50}
  .bar-in{max-width:920px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:15px;color:var(--ink);text-decoration:none}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 4px rgba(15,118,110,.15);flex-shrink:0}
  .bar-actions{display:flex;align-items:center;gap:14px}
  .back{font-size:13px;color:var(--muted);text-decoration:none}
  .back:hover{color:var(--teal)}
  .head{padding:54px 0 34px;border-bottom:1px solid var(--line)}
  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.16em;color:var(--teal-deep);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:10px}
  .eyebrow::before{content:"";width:26px;height:1px;background:var(--teal-deep)}
  h1{font-family:"Noto Serif JP",serif;font-size:clamp(30px,5vw,44px);line-height:1.25;font-weight:700}
  .sub{margin-top:14px;color:var(--muted);font-size:14px}
  main{padding:40px 0 62px}
  .feed{border-top:1px solid var(--line)}
  .post{display:grid;grid-template-columns:118px 1fr auto;gap:22px;align-items:start;padding:24px 8px;border-bottom:1px solid var(--line);color:inherit;transition:background .15s;cursor:pointer}
  .post:hover{background:var(--paper-2)}
  .post:hover .post-title{color:var(--teal)}
  .post-meta{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);line-height:1.6}
  .post-meta .tag{display:inline-block;margin-top:8px;padding:2px 8px;border:1px solid var(--line-strong);border-radius:2px;background:var(--teal);color:#fff;font-size:11px}
  .post-title{font-family:"Noto Serif JP",serif;font-size:19px;font-weight:600;line-height:1.5}
  .post-desc{font-size:14px;color:var(--ink-soft);margin-top:7px}
  .post-tags{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .ptag{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--teal-deep);border:1px solid var(--line-strong);border-radius:3px;padding:4px 11px;text-decoration:none;transition:.12s;letter-spacing:.03em}
  .ptag:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
  .ptag.dow{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:700}
  .ptag.dow:hover{background:var(--teal-deep);border-color:var(--teal-deep)}
  .ptag.stat{color:var(--amber);border-color:#E4C9AF;background:#FFF7EF}
  .ptag.stat:hover{background:var(--amber);color:#fff;border-color:var(--amber)}
  .post-arrow{font-size:20px;color:var(--line-strong);align-self:center}
  .empty{border:1px solid var(--line);background:var(--paper-2);border-radius:3px;padding:24px;color:var(--muted)}
  footer{border-top:1px solid var(--line);padding:34px 0 46px;color:var(--muted);font-size:12px}
  footer a{color:var(--teal-deep);text-decoration:none}
  footer a:hover{color:var(--teal)}
  .foot-links{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .foot-x{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--teal-deep);text-decoration:none;border:1px solid var(--line-strong);background:var(--paper-2);border-radius:2px;padding:7px 12px;white-space:nowrap}
  .foot-x:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
  @media(max-width:640px){
    .wrap,.bar-in{padding-left:18px;padding-right:18px}
    .bar-in{height:54px;gap:12px}
    .brand{font-size:12px;line-height:1.25;white-space:nowrap}
    .bar-actions{gap:10px}
    .back{font-size:12px;white-space:nowrap}
    .head{padding:38px 0 28px}
    .post{grid-template-columns:1fr;gap:10px;padding:20px 4px}
    .post-meta{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
    .post-meta .tag{margin-top:0}
    .post-title{font-size:18px}
    .post-desc{font-size:13px;line-height:1.8}
    .ptag{font-size:11px;padding:3px 9px}
    .post-arrow{display:none}
  }
</style>
<script src="assets/analytics-config.js"></script>
<script src="assets/analytics.js" defer></script>
</head>
<body>

<header class="bar">
  <div class="bar-in">
    <a class="brand" href="index.html"><span class="dot"></span>麻酔・集中治療 / 論文ジャーナルクラブ</a>
    <div class="bar-actions">
      <a class="back" href="index.html">← トップ</a>
    </div>
  </div>
</header>

<div class="head">
  <div class="wrap">
    <div class="eyebrow">All Articles</div>
    <h1>記事一覧</h1>
    <div class="sub" id="summary">公開済みの記事を新しい順に表示します。</div>
  </div>
</div>

<main>
  <div class="wrap">
    <div class="feed" id="feed-list"></div>
    <div class="empty" id="empty" style="display:none">公開済みの記事はまだありません。</div>
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="foot-links">
      <a href="index.html">トップページへ戻る</a>
      <a class="foot-x" href="https://x.com/anes_icu_jc" target="_blank" rel="noopener">Xで更新を見る</a>
    </div>
  </div>
</footer>

<script src="data/sunday-articles.js"></script>
<script src="data/articles.js"></script>
<script>
  function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
  function tagHtml(t){
    const m = t.label.match(/^(G0[1-6])\s+(.+)$/);
    const inner = m ? `<span style="opacity:.6">${esc(m[1])}</span> ${esc(m[2])}` : esc(t.label);
    const cls = t.kind ? ` ${esc(t.kind)}` : "";
    return `<a class="ptag${cls}" href="tags.html?tag=${encodeURIComponent(t.tag)}">${inner}</a>`;
  }
  function cardHtml(a){
    const dow = a.dowTag
      ? `<a class="ptag dow" href="tags.html?tag=${encodeURIComponent(a.dowTag.tag)}">${esc(a.dowTag.label)}</a>`
      : "";
    const tags = (a.tags || []).map(tagHtml).join("");
    return `<article class="post ${a.live ? "live" : ""}" data-href="${esc(a.url)}" role="link" tabindex="0">
      <div class="post-meta">${esc(a.date)} ${esc(a.dow)}<span class="tag">${esc(a.status)}</span></div>
      <div>
        <div class="post-title">${esc(a.title)}</div>
        <div class="post-desc">${esc(a.desc)}</div>
        <div class="post-tags">${dow}${tags}</div>
      </div>
      <div class="post-arrow">→</div>
    </article>`;
  }

  const articles = window.ARTICLES || [];
  const feedList = document.getElementById("feed-list");
  const empty = document.getElementById("empty");
  const summary = document.getElementById("summary");
  if (articles.length) {
    feedList.innerHTML = articles.map(cardHtml).join("");
    summary.textContent = `${articles.length}件の公開済み記事`;
  } else {
    empty.style.display = "block";
  }

  document.querySelectorAll(".post[data-href]").forEach(card=>{
    const href = card.dataset.href;
    card.addEventListener("click", e=>{
      if(e.target.closest("a")) return;
      window.location.href = href;
    });
    card.addEventListener("keydown", e=>{
      if(e.key === "Enter") window.location.href = href;
    });
  });
</script>

</body>
</html>
