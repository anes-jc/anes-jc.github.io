name: Publish Sunday article

on:
  schedule:
    # GitHub cron uses UTC. Sunday 03:00 UTC is Sunday 12:00 JST.
    - cron: "0 3 * * 0"
    # Catch-up run for delayed schedules or temporary API failures.
    - cron: "17 4 * * 0"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: publish-sunday-article
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SITE_URL: https://anes-jc.github.io
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Sunday OGP image dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Generate Sunday article
        run: node scripts/generate-sunday-article.mjs

      - name: Generate Sunday OGP image
        run: python scripts/generate-sunday-ogp.py "$(ls articles/latest-papers-*.html | sort | tail -n 1)"

      - name: Generate sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Generate RSS feed
        run: node scripts/generate-rss.mjs

      - name: Publish generated article
        run: |
          if [ -z "$(git status --porcelain -- articles assets/og data/sunday-articles.js sitemap.xml feed.xml)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles assets/og data/sunday-articles.js sitemap.xml feed.xml
          git commit -m "Publish Sunday latest papers article"
          git push
